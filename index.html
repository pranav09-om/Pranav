<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pranav's Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        header {
            background: #1e293b;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            color: #38bdf8;
        }

        nav {
            text-align: center;
            margin-top: 10px;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }

        section {
            padding: 40px;
            text-align: center;
        }

        .btn {
            background: #38bdf8;
            padding: 10px 20px;
            color: black;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }

        footer {
            background: #1e293b;
            padding: 15px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>🚀 Welcome to My Website</h1>
    <img src="" alt="MY IMAGE">
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="home">
    <h2>Hello, I'm Pranav 👋</h2>
    <p>This is my first real website hosted on the internet!</p>
    <button class="btn" onclick="showMessage()">Click Me</button>
</section>

<section id="about">
    <h2>About Me</h2>
    <p>I am learning web development and building real projects.</p>
</section>

<section id="contact">
    <h2>Contact</h2>
    <p>Email: your@email.com</p>
</section>

<footer>
    <p>© 2026 Pranav | All Rights Reserved</p>
</footer>

<script>
    function showMessage() {
        alert("🔥 Your website is working perfectly!");
    }
</script>

</body>
</html>
